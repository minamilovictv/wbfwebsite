<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News & Announcements — Western Balkans Fund</title>
<meta name="description" content="Latest updates, opportunities, publications, stories, and announcements from the Western Balkans Fund.">
<style>
  /* ============================================================
     RESET & BASE
     ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #1a1e2e;
    background: #fff;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; }
  button { font-family: inherit; }
  .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }

  /* ============================================================
     NAVBAR  (identical to index.html)
     ============================================================ */
  .nb { background: #1A3668; width: 100%; position: sticky; top: 0; z-index: 1000; }
  .nb-inner { display: flex; align-items: center; height: 56px; padding: 0 20px; max-width: 1400px; margin: 0 auto; gap: 4px; }
  .logo { display: flex; align-items: center; gap: 9px; margin-right: 16px; flex-shrink: 0; text-decoration: none; }
  .logo-icon { width: 34px; height: 34px; background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 17px; color: #1A3668; }
  .logo-text { line-height: 1.15; }
  .logo-name { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; }
  .logo-sub  { font-size: 10px; color: rgba(255,255,255,0.6); white-space: nowrap; }
  .nav-items { display: flex; align-items: center; gap: 2px; flex: 1; }
  .nav-btn { background: none; border: none; color: rgba(255,255,255,0.88); font-size: 13px; padding: 6px 10px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 4px; white-space: nowrap; font-family: inherit; text-decoration: none; transition: background 0.15s, color 0.15s; }
  .nav-btn:hover, .nav-btn:focus-visible, .dropdown-wrap:hover > .nav-btn { background: rgba(255,255,255,0.13); color: #fff; outline: none; }
  .chevron { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; transition: transform 0.2s; }
  .dropdown-wrap:hover .chevron { transform: rotate(180deg); }
  .dropdown-wrap { position: relative; }
  .dropdown, .mega { display: none; position: absolute; top: calc(100% + 2px); left: 0; background: #fff; border: 0.5px solid #d1d9e6; border-radius: 8px; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.13); animation: fadeIn 0.12s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .dropdown-wrap:hover .dropdown, .dropdown-wrap:hover .mega { display: block; }
  .dropdown { min-width: 230px; padding: 6px 0; }
  .dd-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 16px; cursor: pointer; text-decoration: none; color: inherit; transition: background 0.1s; }
  .dd-item:hover { background: #f4f7fb; }
  .dd-title { font-size: 13.5px; color: #1a1e2e; font-weight: 500; line-height: 1.3; }
  .dd-sub   { font-size: 11.5px; color: #6b7280; line-height: 1.35; margin-top: 2px; }
  .mega { left: -160px; width: 680px; padding: 18px; }
  .dropdown-wrap:hover .mega { display: grid; grid-template-columns: 1fr 1fr 190px; gap: 0; }
  .mega-col { padding: 0 14px; }
  .mega-col:not(:last-child) { border-right: 0.5px solid #e8ecf2; }
  .mega-col:first-child { padding-left: 0; }
  .mega-head { font-size: 10px; font-weight: 600; color: #9ca3af; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; }
  .mega-section { margin-top: 14px; }
  .mega-item { display: flex; align-items: flex-start; gap: 7px; padding: 0; cursor: pointer; text-decoration: none; color: inherit; }
  .mega-item:hover .m-title { color: #1A3668; text-decoration: underline; }
  .m-dot { width: 6px; height: 6px; border-radius: 50%; background: #1A3668; margin-top: 6px; flex-shrink: 0; }
  .m-title { font-size: 13px; color: #1a1e2e; line-height: 1.4; padding: 4px 0; display: block; }
  .mega-right { padding: 0 0 0 14px; }
  .qa-link { display: block; padding: 5px 0; cursor: pointer; text-decoration: none; }
  .qa-link:hover .qa-label { color: #1A3668; text-decoration: underline; }
  .qa-label { font-size: 13px; color: #1a1e2e; font-weight: 500; }
  .qa-sub   { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .status-block { margin-top: 14px; }
  .status-item { display: flex; align-items: center; gap: 7px; padding: 3px 0; }
  .s-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .s-dot.green { background: #22a05a; } .s-dot.amber { background: #d4870a; }
  .s-dot.dark  { background: #4b5563; } .s-dot.light { background: #c4c9d4; }
  .s-label { font-size: 11.5px; color: #374151; }
  .kb-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; background: #1A3668; color: #fff; border: none; border-radius: 5px; padding: 7px 10px; font-size: 12px; font-weight: 500; margin-top: 12px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .kb-btn:hover { background: #122650; }
  .nav-right { display: flex; align-items: center; gap: 7px; margin-left: auto; flex-shrink: 0; }
  .btn-partners { background: none; border: 1px solid rgba(255,255,255,0.38); color: #fff; font-size: 12.5px; padding: 5px 13px; border-radius: 5px; cursor: pointer; font-family: inherit; text-decoration: none; transition: border-color 0.15s, background 0.15s; }
  .btn-partners:hover { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); }
  .btn-apply { background: #fff; border: none; color: #1A3668; font-size: 12.5px; font-weight: 600; padding: 5px 13px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: inherit; text-decoration: none; transition: background 0.15s; }
  .btn-apply:hover { background: #e8eef8; }
  .btn-apply svg { width: 11px; height: 11px; flex-shrink: 0; }

  /* ============================================================
     PAGE HERO (news header)
     ============================================================ */
  .page-hero {
    position: relative;
    background: linear-gradient(135deg, #0f2044 0%, #1A3668 60%, #0f5a5e 100%);
    overflow: hidden;
    padding: 72px 0 64px;
  }
  .page-hero::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,255,255,0.018) 60px, rgba(255,255,255,0.018) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,255,255,0.018) 60px, rgba(255,255,255,0.018) 61px);
    pointer-events: none;
  }
  .page-hero::after {
    content: ""; position: absolute; top: -120px; right: -80px;
    width: 480px; height: 480px; border-radius: 50%;
    background: radial-gradient(circle, rgba(75,101,132,0.28) 0%, transparent 70%);
    pointer-events: none;
  }
  .page-hero-inner { position: relative; z-index: 2; max-width: 1400px; margin: 0 auto; padding: 0 40px; }
  .breadcrumb {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 16px;
    letter-spacing: 0.02em;
  }
  .breadcrumb a { color: rgba(255,255,255,0.65); text-decoration: none; }
  .breadcrumb a:hover { color: #fff; }
  .breadcrumb span { margin: 0 8px; opacity: 0.5; }

  .page-hero-overline {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: rgba(255,255,255,0.55);
    margin-bottom: 16px;
  }
  .page-hero h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(32px, 4vw, 48px);
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
    max-width: 22ch;
  }
  .page-hero p {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    line-height: 1.65;
    max-width: 60ch;
  }

  /* ============================================================
     FILTERS
     ============================================================ */
  .filters-wrap {
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    position: sticky;
    top: 56px;
    z-index: 100;
  }
  .filters-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .filter-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #94a3b8;
    margin-right: 4px;
    flex-shrink: 0;
    width: 80px;
  }
  .filter-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }
  .chip {
    background: #f1f5f9;
    border: 1px solid transparent;
    color: #475569;
    font-size: 12.5px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .chip:hover { background: #e2e8f0; color: #1A3668; }
  .chip.active {
    background: #1A3668;
    color: #fff;
    border-color: #1A3668;
  }
  .chip-count {
    display: inline-block;
    margin-left: 6px;
    font-size: 10px;
    color: #94a3b8;
    font-weight: 600;
  }
  .chip.active .chip-count { color: rgba(255,255,255,0.6); }

  .results-meta {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 40px 0;
    font-size: 13px;
    color: #64748b;
  }
  .results-meta strong { color: #0f172a; font-weight: 600; }

  /* ============================================================
     NEWS SECTION (grid container only — card styles live in
     components/news-card.html)
     ============================================================ */
  .news-section { padding: 32px 0 88px; background: #fff; }

  /* ============================================================
     FOOTER  (identical to index.html)
     ============================================================ */
  .footer { background: #0f2044; color: rgba(255,255,255,0.75); padding: 56px 40px 0; }
  .footer-inner { max-width: 1400px; margin: 0 auto; }
  .footer-top { display: flex; justify-content: space-between; gap: 0; padding-bottom: 48px; border-bottom: 0.5px solid rgba(255,255,255,0.12); }
  .ft-brand { max-width: 260px; flex-shrink: 0; }
  .ft-cols-right { display: flex; gap: 40px; justify-content: flex-end; }
  .ft-logo { display: block; margin-bottom: 16px; text-decoration: none; }
  .ft-logo img { height: 36px; width: auto; display: block; filter: brightness(0) invert(1); }
  .ft-logo-fallback { display: inline-flex; align-items: center; gap: 8px; }
  .ft-logo-icon { width: 34px; height: 34px; background: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #1A3668; flex-shrink: 0; }
  .ft-logo-name { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.2; }
  .ft-logo-sub  { font-size: 10px; color: rgba(255,255,255,0.55); }
  .ft-tagline { font-size: 12.5px; line-height: 1.7; color: rgba(255,255,255,0.6); margin-bottom: 20px; }
  .ft-social { display: flex; gap: 10px; }
  .ft-social a { width: 34px; height: 34px; border-radius: 6px; border: 0.5px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.7); text-decoration: none; transition: border-color 0.15s, color 0.15s, background 0.15s; }
  .ft-social a:hover { border-color: rgba(255,255,255,0.6); color: #fff; background: rgba(255,255,255,0.08); }
  .ft-social svg { width: 16px; height: 16px; fill: currentColor; }
  .ft-col-head { font-size: 11px; font-weight: 600; color: #fff; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 14px; }
  .ft-section-head { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); letter-spacing: 0.07em; text-transform: uppercase; margin-top: 18px; margin-bottom: 8px; }
  .ft-link { display: block; padding: 4px 0; font-size: 12.5px; color: rgba(255,255,255,0.65); text-decoration: none; line-height: 1.4; transition: color 0.12s; }
  .ft-link:hover { color: #fff; }
  .ft-contact-item { display: flex; align-items: flex-start; gap: 9px; padding: 5px 0; font-size: 12.5px; color: rgba(255,255,255,0.65); line-height: 1.5; }
  .ft-contact-item a { color: rgba(255,255,255,0.65); text-decoration: none; transition: color 0.12s; }
  .ft-contact-item a:hover { color: #fff; }
  .ft-contact-icon { margin-top: 2px; flex-shrink: 0; opacity: 0.5; }
  .ft-contact-icon svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .footer-bottom-wrap { border-top: 0.5px solid rgba(255,255,255,0.1); }
  .footer-bottom { max-width: 1400px; margin: 0 auto; padding: 18px 0; display: flex; align-items: center; justify-content: space-between; }
  .footer-copy { font-size: 12px; color: rgba(255,255,255,0.35); }
  .footer-copy span { margin: 0 6px; opacity: 0.4; }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 1024px) {
    .container, .filters-inner, .page-hero-inner, .results-meta { padding-left: 24px; padding-right: 24px; }
    .footer { padding: 48px 24px 0; }
    .footer-top { flex-direction: column; gap: 40px; }
    .ft-cols-right { justify-content: flex-start; flex-wrap: wrap; }
  }

  @media (max-width: 768px) {
    .nav-items { display: none; }
    .btn-partners { display: none; }
    .page-hero { padding: 56px 0 48px; }
    .filters-wrap { position: static; }
    .filter-label { width: auto; }
    .footer-bottom { flex-direction: column; gap: 8px; }
  }
</style>

    </nav>

<!-- ============================================================

<div class="filters-wrap" role="region" aria-label="Filter news">
  <div class="filters-inner">

<!-- ============================================================

    <div class="cards-grid" id="cards-grid" aria-live="polite"></div>
  </div>

<!-- ============================================================
     MODAL
     Mount point + CSS are injected at runtime from

<!-- ============================================================
     PAGE SCRIPT
     Data comes from the shared data service (js/data-service.js,
     loaded just above). The page only owns: hero, filter state,
     grid container, and wiring components → modal.
     ============================================================ -->
<script src="../js/data-service.js"></script>
<script>
(function () {
  'use strict';

  /* ──────────────────────────────────────────────────────────
     CONFIG
     COMPONENTS_BASE — relative path to the components/ folder
     from this page. The news data source itself lives in
     js/data-service.js.
     ────────────────────────────────────────────────────────── */
  const COMPONENTS_BASE = "../components/";

  const STATE = {
    items: [],
    activeType: 'all',
    activeProgramme: 'all'
  };

  /* ──────────────────────────────────────────────────────────
     UTILITIES
     ────────────────────────────────────────────────────────── */
  function $(sel, ctx) { return (ctx || document).querySelector(sel); }
  function $$(sel, ctx) { return Array.from((ctx || document).querySelectorAll(sel)); }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  /* ──────────────────────────────────────────────────────────
     COMPONENT LOADER
     Fetches a component HTML fragment and injects its <style>,
     markup, and <script> nodes into the host document so the
     embedded scripts execute.
     ────────────────────────────────────────────────────────── */
  async function loadComponent(url) {
    const res = await fetch(url, { cache: 'no-cache' });
    if (!res.ok) throw new Error('Component load failed: ' + url + ' → HTTP ' + res.status);
    const html = await res.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');

    doc.querySelectorAll('style[data-wbf-component]').forEach(s => {
      document.head.appendChild(s.cloneNode(true));
    });
    Array.from(doc.body.childNodes).forEach(node => {
      if (node.nodeType === 1 && (node.tagName === 'SCRIPT' || node.tagName === 'STYLE')) return;
      document.body.appendChild(node.cloneNode(true));
    });
    doc.querySelectorAll('script[data-wbf-component]').forEach(orig => {
      const s = document.createElement('script');
      for (const attr of orig.attributes) s.setAttribute(attr.name, attr.value);
      s.textContent = orig.textContent;
      document.body.appendChild(s);
    });
  }

  /* ──────────────────────────────────────────────────────────
     FILTERS
     Items returned by WBFData.news.all() are already
     normalized (type lower-kebab-cased, drafts dropped,
     sorted by date desc).
     ────────────────────────────────────────────────────────── */
  function buildProgrammeFilters() {
    const wrap = $('#programme-filters');
    const programmes = Array.from(new Set(
      STATE.items.map(i => (i.programme || '').trim()).filter(Boolean)
    )).sort();

    $$('button[data-programme]:not([data-programme="all"])', wrap).forEach(b => b.remove());
    programmes.forEach(p => {
      const count = STATE.items.filter(i => (i.programme || '').trim() === p).length;
      const btn = document.createElement('button');
      btn.className = 'chip';
      btn.dataset.programme = p;
      btn.innerHTML = escapeHtml(p) + ' <span class="chip-count">' + count + '</span>';
      wrap.appendChild(btn);
    });
  }

  function getFiltered() {
    return STATE.items
      .filter(i => STATE.activeType === 'all' ? true : i.type === STATE.activeType)
      .filter(i => STATE.activeProgramme === 'all' ? true : (i.programme || '').trim() === STATE.activeProgramme);
  }

  function renderGrid() {
    const grid = $('#cards-grid');
    const meta = $('#results-meta');
    const list = getFiltered();

    meta.innerHTML = '<strong>' + list.length + '</strong> ' +
      (list.length === 1 ? 'article' : 'articles') +
      (STATE.activeType !== 'all' || STATE.activeProgramme !== 'all' ? ' matching your filters' : '');

    if (!list.length) { window.WBFNewsCard.renderEmpty(grid); return; }
    window.WBFNewsCard.renderGrid(list, grid);
  }

  /* ──────────────────────────────────────────────────────────
     EVENT WIRING
     ────────────────────────────────────────────────────────── */
  function bindFilterChips() {
    $('#type-filters').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-type]');
      if (!btn) return;
      STATE.activeType = btn.dataset.type;
      $$('button[data-type]').forEach(b => b.classList.toggle('active', b === btn));
      renderGrid();
    });

    $('#programme-filters').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-programme]');
      if (!btn) return;
      STATE.activeProgramme = btn.dataset.programme;
      $$('#programme-filters button[data-programme]').forEach(b => b.classList.toggle('active', b === btn));
      renderGrid();
    });
  }

  /* ──────────────────────────────────────────────────────────
     INIT
     ────────────────────────────────────────────────────────── */
  async function init() {
    const grid = $('#cards-grid');

    /* Inline skeleton until the card component CSS loads. */
    grid.innerHTML =
      '<div class="skeleton-card"><div class="sk sk-img" style="height:200px;background:#e2e8f0;border-radius:0"></div></div>'.repeat(3);

    try {
      await loadComponent(COMPONENTS_BASE + 'news-card.html');
      await loadComponent(COMPONENTS_BASE + 'news-modal.html');
    } catch (err) {
      console.error('Component load failed:', err);
      grid.innerHTML =
        '<div style="grid-column:1/-1;padding:48px;text-align:center;color:#64748b;background:#f8fafc;border-radius:10px">' +
          '<h3 style="color:#0f172a;font-size:17px;margin-bottom:6px">Components could not be loaded</h3>' +
          '<p>Open this page through a local web server (e.g. <code>python -m http.server</code>) ' +
          'rather than directly via <code>file://</code>.</p>' +
        '</div>';
      return;
    }

    if (!window.WBFNewsCard || !window.WBFNewsModal) {
      console.error('Component API missing after load');
      return;
    }
    if (!window.WBFData || !window.WBFData.news) {
      console.error('WBFData.news unavailable — is js/data-service.js loaded?');
      window.WBFNewsCard.renderError(grid);
      return;
    }

    window.WBFNewsCard.renderSkeletons(grid, 6);
    bindFilterChips();

    try {
      STATE.items = await window.WBFData.news.all();
      buildProgrammeFilters();
      renderGrid();

      /* Cards → modal, plus ?article=ID deep links. */
      window.WBFNewsCard.bindClicks(grid, STATE.items, item => window.WBFNewsModal.open(item));
      window.WBFNewsModal.enableDeepLink(STATE.items, 'id');
    } catch (err) {
      console.error(err);
      window.WBFNewsCard.renderError(grid);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

    .then(r => r.text())
    .then(html => document.getElementById('footer-placeholder').innerHTML = html);
