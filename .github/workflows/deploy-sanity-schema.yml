name: Deploy Sanity schema + Studio

# Whenever the schema or Studio source changes on `main`, redeploy the
# schema manifest AND rebuild + push the Studio bundle to the existing
# Sanity-managed Studio, so editors see new document types, sidebar
# entries, and field changes without anyone running `sanity deploy`
# locally.
#
# Required GitHub secrets:
#   SANITY_AUTH_TOKEN  – a Sanity "Deploy Studio" (or higher) token
#                        from https://www.sanity.io/manage → Project
#                        → API → Tokens.

on:
  push:
    branches: [main]
    paths:
      - 'sanity/**'
      - '.github/workflows/deploy-sanity-schema.yml'
  workflow_dispatch: {}

concurrency:
  group: sanity-schema-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy schema + Studio bundle
    runs-on: ubuntu-latest

    env:
      SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
      SANITY_STUDIO_PROJECT_ID: x1vbhp4a
      SANITY_STUDIO_DATASET: production
      # Keep the Next.js env names in sync so the same sanity.config.ts
      # works in CI and locally without changes.
      NEXT_PUBLIC_SANITY_PROJECT_ID: x1vbhp4a
      NEXT_PUBLIC_SANITY_DATASET: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Sanity CLI + studio runtime
        working-directory: sanity
        run: |
          # The /sanity folder holds only the schema and config; create
          # a transient package.json so the CLI has a project to anchor
          # to, then install what's needed to bundle the schema and to
          # build the Studio for `sanity deploy`. Versions are pinned to
          # the same major that `npx sanity@latest` uses, so the local
          # build and the CLI don't disagree on peer dependencies.
          if [ ! -f package.json ]; then
            npm init -y > /dev/null
          fi
          npm install --no-save --no-audit --no-fund \
            sanity@latest \
            @sanity/vision@latest \
            react@^18 react-dom@^18 \
            styled-components@^6

      - name: Verify auth token is configured
        run: |
          if [ -z "$SANITY_AUTH_TOKEN" ]; then
            echo "::error::SANITY_AUTH_TOKEN secret is not set on this repository."
            echo "Create one at https://www.sanity.io/manage → Project → API → Tokens"
            echo "with at least 'Deploy Studio' permissions, then add it as a"
            echo "GitHub Actions secret named SANITY_AUTH_TOKEN."
            exit 1
          fi

      - name: Deploy schema
        working-directory: sanity
        # The workspace name must match `name` in sanity/sanity.config.ts.
        run: npx --yes sanity@latest schema deploy --workspace wbf-studio

      - name: Deploy Studio bundle
        working-directory: sanity
        # Builds the Studio from sanity.config.ts and pushes the bundle to
        # the existing Sanity-managed Studio (appId in sanity.cli.ts), so
        # editors see new document types, sidebar entries, and field
        # changes without anyone running `sanity deploy` locally.
        run: npx --yes sanity@latest deploy --yes
